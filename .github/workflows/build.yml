name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    env:
      SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
    strategy:
      matrix:
        build-type: [native, universal]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print environment
        run: |
          sw_vers
          xcode-select -p
          swiftc --version

      - name: Import signing certificate
        if: env.SIGNING_CERT_P12 != ''
        env:
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          # Decode certificate
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$SIGNING_CERT_P12" | base64 --decode > cert.p12

          # Create temporary keychain
          security create-keychain -p "ci_keychain" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci_keychain" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          # Import certificate
          security import cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security

          # Allow codesign to access keychain without prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "ci_keychain" "$KEYCHAIN_PATH"

          # Add to search list (preserve existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Clean up p12
          rm cert.p12

          # Show available identities
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build (${{ matrix.build-type }})
        run: |
          chmod +x build.sh
          if [ "${{ matrix.build-type }}" = "universal" ]; then
            ./build.sh --universal
          else
            ./build.sh
          fi

      - name: Verify app bundle
        run: |
          test -d build/FinderCut.app
          test -f build/FinderCut.app/Contents/MacOS/FinderCut
          test -d build/FinderCut.app/Contents/PlugIns/FinderCutExtension.appex
          echo "App bundle structure verified"

          # Show what identity was used
          echo "Code signature info:"
          codesign -dvv build/FinderCut.app 2>&1 | grep -E "^(Authority|TeamIdentifier|Identifier|Signature)" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinderCut-${{ matrix.build-type }}
          path: build/FinderCut.app

      - name: Cleanup keychain
        if: always() && env.SIGNING_CERT_P12 != ''
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

  release:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        if: env.SIGNING_CERT_P12 != ''
        env:
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$SIGNING_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p "ci_keychain" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci_keychain" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security import cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "ci_keychain" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm cert.p12

      - name: Build universal binary
        run: |
          chmod +x build.sh
          ./build.sh --clean --universal

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate DMG background
        run: |
          pip3 install Pillow
          python3 -c "
          from PIL import Image, ImageDraw, ImageFont

          W, H = 660, 400
          img = Image.new('RGB', (W, H))
          draw = ImageDraw.Draw(img)

          # Gradient background (light gray to slightly darker)
          for y in range(H):
              r = int(240 - (y / H) * 30)
              g = int(240 - (y / H) * 30)
              b = int(245 - (y / H) * 25)
              draw.line([(0, y), (W, y)], fill=(r, g, b))

          # Arrow from app icon area to Applications area
          arrow_y = 200
          arrow_left = 260
          arrow_right = 410
          arrow_color = (160, 160, 165)

          # Arrow shaft
          draw.rectangle([arrow_left, arrow_y - 4, arrow_right - 20, arrow_y + 4], fill=arrow_color)

          # Arrow head
          draw.polygon([
              (arrow_right, arrow_y),
              (arrow_right - 30, arrow_y - 18),
              (arrow_right - 30, arrow_y + 18)
          ], fill=arrow_color)

          # Text
          try:
              font = ImageFont.truetype('/System/Library/Fonts/Helvetica.ttc', 16)
          except:
              font = ImageFont.load_default()
          text = 'Drag to Applications'
          bbox = draw.textbbox((0, 0), text, font=font)
          tw = bbox[2] - bbox[0]
          draw.text(((W - tw) / 2, 340), text, fill=(120, 120, 125), font=font)

          img.save('.github/dmg-background.png')
          print('DMG background generated')
          "

      - name: Create DMG
        run: |
          create-dmg \
            --volname "FinderCut" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "FinderCut.app" 185 200 \
            --hide-extension "FinderCut.app" \
            --app-drop-link 475 200 \
            --background ".github/dmg-background.png" \
            "FinderCut.dmg" \
            "build/" \
          || test $? -eq 2

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FinderCut-dmg
          path: FinderCut.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "FinderCut $TAG" \
            --notes "Automated release of FinderCut (universal binary for macOS)." \
            FinderCut.dmg

      - name: Cleanup keychain
        if: always() && env.SIGNING_CERT_P12 != ''
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
